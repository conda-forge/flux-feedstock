context:
  version: "2.8.2"

package:
  name: flux
  version: ${{ version }}

source:
  url: https://github.com/fluxcd/flux2/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 0236382179ef5e94a8d1c36de6e4b1093f7955e8fbb088dd7cdfc0060d3f7799
  target_directory: src

build:
  number: 0
  skip:
    - win
  script:
    - cd src
    - bash manifests/scripts/bundle.sh
    - go-licenses save ./cmd/flux --save_path ../library_licenses
    - go build -v -o $PREFIX/bin/flux -ldflags="-s -w -X main.VERSION=${{ version }}" ./cmd/flux

requirements:
  build:
    - ${{ compiler("go-nocgo") }}
    - go-licenses
    - kustomize

tests:
  - script: flux --version
  - package_contents:
      bin:
        - flux
      strict: true

about:
  homepage: https://fluxcd.io
  summary: Flux CLI - the command line tool for Flux v2
  description: |
    Flux is a tool for keeping Kubernetes clusters in sync with sources of
    configuration (like Git repositories and OCI artifacts), and automating
    updates to configuration when there is new code to deploy. Flux v2 is
    built from the ground up to use Kubernetes' API extension system, and to
    integrate with Prometheus and other core components of the Kubernetes
    ecosystem.
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  documentation: https://fluxcd.io/flux/
  repository: https://github.com/fluxcd/flux2

extra:
  recipe-maintainers:
    - ytausch
